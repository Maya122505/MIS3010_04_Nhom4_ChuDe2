{% extends 'khach/base.html' %}

{% block title %}Đăng nhập - FlowerHub{% endblock %}

{% block content %}
<div class="bg-gray-50 flex-grow flex items-center justify-center py-20 w-full">
    <div class="bg-white p-10 rounded-3xl shadow-xl border border-gray-100 w-full max-w-md">
        <h2 class="text-3xl font-extrabold text-gray-800 text-center mb-10">Đăng nhập tài khoản</h2>
        
        <form method="GET" action="{% url 'after_login' %}" class="space-y-6">
            <div>
                <label class="block font-bold text-sm text-gray-700 mb-2">Tên đăng nhập hoặc Email</label>
                <input name="username" type="text" placeholder="" class="w-full px-5 py-4 border border-gray-200 rounded-2xl outline-none focus:border-brand transition bg-gray-50 focus:bg-white" required>
            </div>
            <div>
                <div class="flex justify-between mb-2">
                    <label class="font-bold text-sm text-gray-700">Mật khẩu</label>
                    <a href="#" class="text-brand text-sm font-semibold hover:underline">Quên mật khẩu?</a>
                </div>
                <input name="password" type="password" placeholder="********" class="w-full px-5 py-4 border border-gray-200 rounded-2xl outline-none focus:border-brand transition bg-gray-50 focus:bg-white" required>
            </div>
            
            <button type="submit" class="w-full bg-brand hover:bg-brand-dark text-white font-bold py-4 rounded-2xl text-lg shadow-md transition transform active:scale-95 mt-4">
                Đăng nhập ngay
            </button>
        </form>
        
        <div class="mt-8 text-center text-sm font-semibold text-gray-600 border-t pt-6">
            Chưa có tài khoản? <a href="{% url 'register' %}" class="text-brand hover:underline">Đăng ký ngay</a>
        </div>
        <p class="text-xs text-center text-gray-400 mt-6">Bằng việc đăng nhập, bạn đồng ý với Điều khoản dịch vụ và Chính sách bảo mật của FlowerHub.</p>
    </div>
</div>
{% endblock %}
