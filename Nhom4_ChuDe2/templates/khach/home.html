{% extends 'base.html' %}
{% load static %}
{% block content %}
<nav class="bg-white border-b px-8 py-4 flex justify-between items-center sticky top-0 z-50">
    <div class="flex items-center space-x-2"><img src="{% static 'images/logo.png' %}" class="h-8"><span class="text-2xl font-bold text-flower-pink" style="color:#F2789F">FlowerHub</span></div>
    <div class="flex items-center space-x-6">
        <a href="{% url 'login' %}" class="font-bold text-gray-500">Đăng nhập</a>
        <a href="{% url 'register_khach' %}" class="bg-flower-pink text-white px-6 py-2 rounded-full font-bold" style="background-color:#F2789F">Đăng ký</a>
    </div>
</nav>
<div class="bg-pink-100 py-20 text-center">
    <h2 class="text-4xl font-bold mb-6">🌸 Tìm kiếm tiệm hoa</h2>
    <div class="max-w-2xl mx-auto relative">
        <input type="text" placeholder="Tìm kiếm phong cách, dịch vụ..." class="w-full p-5 rounded-full shadow-2xl outline-none pl-12">
        <button class="absolute right-3 top-2 bg-flower-pink text-white px-8 py-3 rounded-full font-bold" style="background-color:#F2789F">Tìm kiếm</button>
    </div>
</div>
{% endblock %}
