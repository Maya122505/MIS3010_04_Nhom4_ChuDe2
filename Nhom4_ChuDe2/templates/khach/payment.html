{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white max-w-4xl w-full rounded-3xl shadow-xl overflow-hidden flex flex-col md:flex-row border">
        <div class="p-10 flex-1 bg-gray-50">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">Thông tin chuyển khoản</h2>
            <div class="space-y-4">
                <div class="bg-white p-4 rounded-xl border">
                    <p class="text-xs text-gray-400 uppercase">Ngân hàng</p>
                    <p class="font-bold">Vietcombank</p>
                </div>
                <div class="bg-white p-4 rounded-xl border">
                    <p class="text-xs text-gray-400 uppercase">Số tài khoản</p>
                    <p class="font-bold text-flower-pink text-xl tracking-widest">0123456789</p>
                </div>
                <div class="bg-white p-4 rounded-xl border">
                    <p class="text-xs text-gray-400 uppercase">Số tiền</p>
                    <p class="font-bold text-gray-800 text-xl">470.000đ</p>
                </div>
            </div>
        </div>
        <div class="p-10 flex-1 flex flex-col items-center justify-center text-center">
            <div class="p-4 bg-white border-4 border-pink-100 rounded-3xl mb-6 shadow-inner">
                <img src="{% static 'images/logo.png' %}" class="w-48 h-48 opacity-25">
                <p class="text-xs text-gray-300 mt-2 italic">[Mã QR Thanh Toán]</p>
            </div>
            <button class="w-full bg-flower-pink text-white font-bold py-4 rounded-2xl hover:opacity-90 transition shadow-lg">
                Xác nhận đã thanh toán
            </button>
        </div>
    </div>
</div>
{% endblock %}
