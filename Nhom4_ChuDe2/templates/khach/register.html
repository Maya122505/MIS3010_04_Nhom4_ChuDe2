{% extends 'khach/base.html' %}

{% block title %}Đăng ký - FlowerHub{% endblock %}

{% block content %}
<div class="bg-gray-50 flex-grow flex items-center justify-center py-20 w-full">
    <div class="bg-white p-10 rounded-3xl shadow-xl border border-gray-100 w-full max-w-lg">
        <h2 class="text-3xl font-extrabold text-gray-800 text-center mb-8">Đăng ký tài khoản</h2>
        
        <form method="POST" action="{% url 'register' %}" class="space-y-5">
            {% csrf_token %}
            <div>
                <label class="block font-bold text-sm text-gray-700 mb-2">Tên đăng nhập</label>
                <input name="username" type="text" placeholder="" class="w-full px-5 py-3 border border-gray-200 rounded-2xl outline-none focus:border-brand transition bg-gray-50" required>
            </div>
            <div>
                <label class="block font-bold text-sm text-gray-700 mb-2">Email</label>
                <input name="email" type="email" placeholder="" class="w-full px-5 py-3 border border-gray-200 rounded-2xl outline-none focus:border-brand transition bg-gray-50" required>
            </div>
            <div>
                <label class="block font-bold text-sm text-gray-700 mb-2">Số điện thoại</label>
                <input name="phone" type="text" placeholder="" class="w-full px-5 py-3 border border-gray-200 rounded-2xl outline-none focus:border-brand transition bg-gray-50">
            </div>
            <div>
                <label class="block font-bold text-sm text-gray-700 mb-2">Mật khẩu</label>
                <input name="password" type="password" placeholder="********" class="w-full px-5 py-3 border border-gray-200 rounded-2xl outline-none focus:border-brand transition bg-gray-50" required>
            </div>
            <div>
                <label class="block font-bold text-sm text-gray-700 mb-2">Xác nhận mật khẩu</label>
                <input name="confirm_password" type="password" placeholder="********" class="w-full px-5 py-3 border border-gray-200 rounded-2xl outline-none focus:border-brand transition bg-gray-50" required>
            </div>
            
            <button type="submit" class="w-full bg-brand hover:bg-brand-dark text-white font-bold py-4 rounded-2xl text-lg shadow-md transition transform active:scale-95 mt-4">
                Đăng ký ngay
            </button>
        </form>
        
        <div class="mt-6 text-center text-sm font-semibold text-gray-600 border-t pt-6">
            Đã có tài khoản? <a href="{% url 'login' %}" class="text-brand hover:underline">Đăng nhập ngay</a>
        </div>
    </div>
</div>
{% endblock %}
