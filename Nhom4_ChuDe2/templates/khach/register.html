{% extends 'base.html' %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4">
    <div class="max-w-md w-full bg-white p-10 rounded-[40px] shadow-lg border border-gray-100">
        <h2 class="text-3xl font-bold text-center mb-8 text-gray-800 tracking-tight">Đăng ký tài khoản</h2>
        <form class="space-y-4">
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">Tên người dùng</label>
                <input type="text" placeholder="Nguyễn Văn A" class="w-full p-4 bg-gray-50 rounded-2xl border-none focus:ring-2 focus:ring-pink-300 outline-none transition-all">
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">Email</label>
                <input type="email" placeholder="example@gmail.com" class="w-full p-4 bg-gray-50 rounded-2xl border-none focus:ring-2 focus:ring-pink-300 outline-none transition-all">
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">Mật khẩu</label>
                <input type="password" placeholder="********" class="w-full p-4 bg-gray-50 rounded-2xl border-none focus:ring-2 focus:ring-pink-300 outline-none transition-all">
            </div>
            <button type="button" onclick="location.href='{% url 'login' %}'" class="w-full bg-pink-500 text-white font-bold py-4 rounded-2xl shadow-lg hover:opacity-90 transition transform active:scale-95 mt-6" style="background-color: #F2789F;">
                Đăng ký ngay
            </button>
        </form>
        <p class="mt-8 text-sm text-center text-gray-400">Đã có tài khoản? <a href="{% url 'login' %}" class="text-pink-500 font-bold">Đăng nhập</a></p>
    </div>
</div>
{% endblock %}
