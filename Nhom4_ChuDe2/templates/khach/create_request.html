{% extends 'base.html' %}
{% block content %}
<div class="max-w-3xl mx-auto py-12 px-6">
    <div class="bg-white rounded-[40px] shadow-2xl border border-pink-100 p-10 relative overflow-hidden">
        <div class="absolute top-0 right-0 w-32 h-32 bg-pink-50 rounded-bl-full -z-0 opacity-50"></div>
        
        <div class="relative z-10">
            <h2 class="text-3xl font-black text-gray-800 mb-2">Tạo yêu cầu mới</h2>
            <p class="text-gray-400 text-sm mb-10">Gửi ý tưởng của bạn để nhận báo giá tốt nhất từ tiệm</p>

            <form action="{% url 'home' %}" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="md:col-span-1">
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 ml-2">Dịp sử dụng *</label>
                    <input type="text" placeholder="VD: Sinh nhật, Kỷ niệm..." class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-pink-200">
                </div>
                <div class="md:col-span-1">
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 ml-2">Ngân sách dự kiến (VNĐ) *</label>
                    <input type="text" placeholder="VD: 500.000" class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-pink-200">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 ml-2">Địa chỉ giao hàng *</label>
                    <input type="text" placeholder="Số nhà, tên đường, phường/xã..." class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-pink-200">
                </div>
                <div class="md:col-span-2 text-left">
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 ml-2">Mô tả & Yêu cầu cụ thể</label>
                    <textarea class="w-full h-32 p-4 bg-gray-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-pink-200" placeholder="Màu sắc yêu cầu, loại hoa chính, thông điệp trên thiệp..."></textarea>
                </div>

                <div class="md:col-span-2 pt-4">
                    <button type="submit" class="w-full bg-pink-500 text-white font-black py-5 rounded-2xl shadow-xl hover:shadow-pink-200 transition-all transform active:scale-95" style="background-color: #F2789F;">
                        Gửi yêu cầu thiết kế <i class="fas fa-paper-plane ml-2"></i>
                    </button>
                    <button type="button" onclick="history.back()" class="w-full text-gray-400 text-sm font-bold mt-4 hover:text-gray-600">Hủy bỏ</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
