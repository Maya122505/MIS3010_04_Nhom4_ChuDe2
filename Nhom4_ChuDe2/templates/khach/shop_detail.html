{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="max-w-5xl mx-auto py-10 px-4">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <div class="bg-white p-6 rounded-3xl border shadow-sm h-fit text-center">
            <img src="{% static tiem.anh %}" class="w-full h-40 object-cover rounded-2xl mb-4">
            <h1 class="text-xl font-bold">{{ tiem.ten }}</h1>
            <p class="text-yellow-400 my-2">★ {{ tiem.rate }}</p>
            <button class="w-full py-2 border border-pink-500 text-pink-500 rounded-xl font-bold mt-4">Chat ngay</button>
        </div>
        <div class="md:col-span-2 bg-white p-8 rounded-3xl border shadow-md">
            <h2 class="text-xl font-bold mb-6 text-pink-500">Tạo yêu cầu thiết kế</h2>
            <form class="space-y-4">
                <input type="text" placeholder="Dịp sử dụng" class="w-full p-3 bg-gray-50 rounded-xl border-none outline-none">
                <input type="text" placeholder="Ngân sách (VNĐ)" class="w-full p-3 bg-gray-50 rounded-xl border-none outline-none">
                <textarea placeholder="Ghi chú thêm..." class="w-full p-3 bg-gray-50 rounded-xl border-none outline-none h-32"></textarea>
                <button type="button" onclick="location.href='{% url 'home' %}'" class="w-full bg-pink-500 text-white font-bold py-4 rounded-xl shadow-lg" style="background-color: #F2789F;">Gửi yêu cầu</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
