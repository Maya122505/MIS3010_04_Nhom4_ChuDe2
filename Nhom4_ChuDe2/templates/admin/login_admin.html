{% extends 'base.html' %}
{% load static %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Inter', sans-serif; }
</style>

<div class="min-h-screen flex flex-col bg-[#e9eff6]">

    <header class="bg-white p-6 shadow-sm border-b border-gray-100">
        <div class="container mx-auto">
            <a href="#" class="flex items-center gap-3">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C10.9 2 10 2.9 10 4C10 4.1 10 4.2 10 4.3C8.9 4.1 7.8 4.6 7.1 5.5C6.4 6.4 6.2 7.6 6.6 8.6C5.5 8.7 4.6 9.6 4.6 10.7C4.6 11.8 5.4 12.6 6.4 12.8L2 20H22L17.6 12.8C18.6 12.6 19.4 11.8 19.4 10.7C19.4 9.6 18.5 8.7 17.4 8.6C17.8 7.6 17.6 6.4 16.9 5.5C16.2 4.6 15.1 4.1 14 4.3C14 4.2 14 4.1 14 4C14 2.9 13.1 2 12 2Z" fill="#F2789F"/>
                </svg>
                <span class="text-2xl font-black text-[#F2789F] tracking-tighter">FlowerHub</span>
            </a>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center relative p-4">

        <div class="absolute top-[10%] left-[10%] w-[150px] h-[150px] bg-[#FFF0F5] rounded-[40px] flex items-center justify-center -rotate-12 z-0 opacity-80">
            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="opacity-20">
                <path d="M12 2C10.9 2 10 2.9 10 4C10 4.1 10 4.2 10 4.3C8.9 4.1 7.8 4.6 7.1 5.5C6.4 6.4 6.2 7.6 6.6 8.6C5.5 8.7 4.6 9.6 4.6 10.7C4.6 11.8 5.4 12.6 6.4 12.8L2 20H22L17.6 12.8C18.6 12.6 19.4 11.8 19.4 10.7C19.4 9.6 18.5 8.7 17.4 8.6C17.8 7.6 17.6 6.4 16.9 5.5C16.2 4.6 15.1 4.1 14 4.3C14 4.2 14 4.1 14 4C14 2.9 13.1 2 12 2Z" fill="#F2789F"/>
            </svg>
        </div>

        <div class="absolute bottom-[5%] right-[5%] w-[200px] h-[200px] z-0 opacity-10">
             <svg viewBox="0 0 100 100" fill="#F2789F">
                <path d="M50 0 C60 20, 80 20, 100 30 C80 40, 80 60, 100 70 C80 80, 60 80, 50 100 C40 80, 20 80, 0 70 C20 60, 20 40, 0 30 C20 20, 40 20, 50 0 Z"></path>
             </svg>
        </div>

        <div class="bg-white p-12 rounded-[40px] shadow-2xl w-full max-w-md z-10 border border-gray-50 flex flex-col items-center">

            <div class="w-16 h-16 bg-[#FFF0F5] rounded-3xl flex items-center justify-center mb-6">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M15 12H3M15 12L11 8M15 12L11 16" stroke="#F2789F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M9 18V19C9 20.1046 9.89543 21 11 21H19C20.1046 21 21 20.1046 21 19V5C21 3.89543 20.1046 3 19 3H11C9.89543 3 9 3.89543 9 5V6" stroke="#F2789F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>

            <h1 class="text-3xl font-extrabold text-gray-800 tracking-tight mb-2">Chào mừng trở lại</h1>
            <p class="text-gray-400 text-sm font-medium mb-10">Đăng nhập hệ thống</p>

            <form method="POST" class="w-full space-y-6">
                {% csrf_token %}

                {% if error %}
                <div class="bg-red-50 text-red-400 text-xs font-bold p-4 rounded-xl border border-red-100 flex items-center">
                    <i class="fas fa-exclamation-circle mr-2"></i> {{ error }}
                </div>
                {% endif %}

                <div class="w-full">
                    <label class="block text-xs font-semibold text-gray-600 mb-2 ml-1">Tên đăng nhập</label>
                    <input type="text" name="username" placeholder="Fhadmin" required
                        class="w-full px-5 py-3.5 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-[#F2789F]/20 focus:border-[#F2789F] outline-none text-sm transition-all font-medium text-gray-700 placeholder-gray-300">
                </div>

                <div class="w-full relative">
                    <label class="block text-xs font-semibold text-gray-600 mb-2 ml-1">Mật khẩu</label>
                    <input type="password" name="password" placeholder="********" required
                        class="w-full px-5 py-3.5 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-[#F2789F]/20 focus:border-[#F2789F] outline-none text-sm transition-all font-medium text-gray-700 placeholder-gray-300">
                    <button type="button" class="absolute right-4 top-[40px] text-gray-400 hover:text-gray-600">
                        <i class="far fa-eye text-sm"></i>
                    </button>
                </div>

                <button type="submit"
                    class="w-full bg-[#F2789F] hover:bg-[#e0668d] text-white font-bold py-4 rounded-xl shadow-lg shadow-pink-100 transition-all duration-300 text-sm flex items-center justify-center gap-2 mt-8">
                    Đăng nhập <i class="fas fa-arrow-right text-xs"></i>
                </button>
            </form>

        </div>
    </main>

</div>
{% endblock %}
