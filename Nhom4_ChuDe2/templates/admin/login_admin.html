{% extends 'base.html' %}
{% load static %}

{% block main_content %}
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Quicksand', sans-serif; }
    /* Hiệu ứng rung khi có lỗi */
    .animate-shake {
        animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
    }
    @keyframes shake {
        10%, 90% { transform: translate3d(-1px, 0, 0); }
        20%, 80% { transform: translate3d(2px, 0, 0); }
        30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
        40%, 60% { transform: translate3d(4px, 0, 0); }
    }
</style>

<div class="min-h-screen flex flex-col bg-[#F8FAF7] relative overflow-hidden">

    <header class="bg-white/80 backdrop-blur-md p-5 shadow-sm border-b border-gray-100 sticky top-0 z-50">
        <div class="container mx-auto px-4">
            <a href="#" class="flex items-center gap-2 group">
                <a href="{% url 'home' %}" class="flex items-center">
                    <img src="{% static 'images/logo.png' %}" alt="Logo" class="h-10 w-auto">
                </a>

            </a>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center relative p-6 overflow-hidden">

        <div class="absolute bottom-[8%] right-[8%] w-[220px] h-[220px] z-0 opacity-5">
             <svg viewBox="0 0 100 100" fill="#F2789F">
                <path d="M50 0 C60 20, 80 20, 100 30 C80 40, 80 60, 100 70 C80 80, 60 80, 50 100 C40 80, 20 80, 0 70 C20 60, 20 40, 0 30 C20 20, 40 20, 50 0 Z"></path>
             </svg>
        </div>

        <div class="bg-white/80 backdrop-blur-xl p-10 md:p-12 rounded-[48px] shadow-[0_20px_50px_rgba(242,120,159,0.1)] w-full max-w-[420px] z-10 border border-white/50 flex flex-col items-center">

            <div class="w-20 h-20 bg-[#FFF0F5] rounded-3xl flex items-center justify-center mb-8 shadow-inner border border-pink-50">
                <i class="fas fa-user-lock text-2xl text-[#F2789F]"></i>
            </div>

            <h1 class="text-3xl font-black text-slate-800 tracking-tight mb-2">Chào mừng trở lại!</h1>
            <p class="text-gray-400 text-xs font-black uppercase tracking-[0.2em] mb-10 text-center">Cổng quản trị viên FlowerHub</p>

            <form method="POST" class="w-full space-y-6">
                {% csrf_token %}

                {% if error %}
                <div class="bg-red-50 text-red-500 text-[11px] font-bold p-4 rounded-2xl border border-red-100 flex items-center animate-shake">
                    <i class="fas fa-exclamation-circle mr-2 text-sm"></i> {{ error }}
                </div>
                {% endif %}

                <div class="w-full">
                    <label class="block text-[11px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Tài khoản</label>
                    <div class="relative group">
                        <i class="far fa-user absolute left-5 top-1/2 -translate-y-1/2 text-gray-300 group-focus-within:text-[#F2789F] transition"></i>
                        <input type="text" name="username" placeholder="Tên đăng nhập..." required
                            class="w-full pl-12 pr-5 py-4 bg-gray-50/50 border border-gray-100 rounded-2xl focus:ring-4 focus:ring-pink-50 focus:border-[#F2789F] focus:bg-white outline-none text-sm transition-all font-bold text-slate-700 placeholder-gray-300">
                    </div>
                </div>

                <div class="w-full relative">
                    <label class="block text-[11px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Mật khẩu</label>
                    <div class="relative group">
                        <i class="far fa-lock absolute left-5 top-1/2 -translate-y-1/2 text-gray-300 group-focus-within:text-[#F2789F] transition"></i>
                        <input type="password" id="passwordField" name="password" placeholder="••••••••" required
                            class="w-full pl-12 pr-14 py-4 bg-gray-50/50 border border-gray-100 rounded-2xl focus:ring-4 focus:ring-pink-50 focus:border-[#F2789F] focus:bg-white outline-none text-sm transition-all font-bold text-slate-700 placeholder-gray-300">

                        <button type="button" onclick="togglePassword()" class="absolute right-5 top-1/2 -translate-y-1/2 text-gray-300 hover:text-[#F2789F] transition-colors">
                            <i id="eyeIcon" class="far fa-eye text-sm"></i>
                        </button>
                    </div>
                </div>

                <button type="submit"
                    class="w-full bg-[#F2789F] hover:bg-[#e0668d] text-white font-black py-5 rounded-2xl shadow-xl shadow-pink-100 transition-all duration-300 text-[11px] uppercase tracking-[0.2em] flex items-center justify-center gap-3 mt-8">
                    Đăng nhập hệ thống <i class="fas fa-chevron-right text-[10px]"></i>
                </button>
            </form>

            <p class="mt-12 text-[10px] text-gray-300 font-bold uppercase tracking-widest italic">© 2026 FlowerHub Admin Team</p>
        </div>
    </main>
</div>

<script>
    function togglePassword() {
        const passwordField = document.getElementById('passwordField');
        const eyeIcon = document.getElementById('eyeIcon');
        if (passwordField.type === 'password') {
            passwordField.type = 'text';
            eyeIcon.classList.remove('fa-eye');
            eyeIcon.classList.add('fa-eye-slash');
        } else {
            passwordField.type = 'password';
            eyeIcon.classList.remove('fa-eye-slash');
            eyeIcon.classList.add('fa-eye');
        }
    }
</script>
{% endblock %}
