{% load static %}
<aside class="w-72 bg-white h-screen flex flex-col border-r border-gray-100 flex-shrink-0">
    <div class="px-8 py-10">
        <a href="{% url 'home' %}" class="flex items-center">
            <img src="{% static 'images/logo.png' %}" alt="Logo" class="h-10 w-auto">
        </a>
    </div>

    <nav class="flex-1 px-4 space-y-3">
        <a href="{% url 'admin_users' %}"
           class="flex items-center px-6 py-4 rounded-2xl font-bold text-sm transition-all
           {% if request.resolver_match.url_name == 'admin_users' %}
                bg-[#FFF0F5] text-[#F2789F] shadow-sm
           {% else %}
                text-gray-400 hover:bg-gray-50
           {% endif %}">
            <i class="fas fa-users mr-4 text-lg"></i>
            <span class="whitespace-nowrap">Quản lý người dùng</span>
        </a>

        <a href="{% url 'admin_dashboard' %}"
           class="flex items-center px-6 py-4 rounded-2xl font-bold text-sm transition-all
           {% if request.resolver_match.url_name == 'admin_dashboard' %}
                bg-[#FFF0F5] text-[#F2789F] shadow-sm
           {% else %}
                text-gray-400 hover:bg-gray-50
           {% endif %}">
            <i class="fas fa-chart-line mr-4 text-lg"></i>
            <span class="whitespace-nowrap">Thống kê hoạt động</span>
        </a>
    </nav>

    <div class="p-6">
        <button class="flex items-center w-full px-6 py-4 bg-gray-50 rounded-2xl text-[12px] font-bold uppercase tracking-widest text-gray-400 hover:bg-gray-100 transition">
            <i class="fas fa-moon mr-3"></i>
            <span>Chế độ tối</span>
        </button>
    </div>
</aside>
