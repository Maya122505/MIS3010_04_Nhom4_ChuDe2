{% load static %}
<aside class="w-72 bg-white h-screen flex flex-col border-r border-gray-100 sticky top-0 transition-all duration-300">
    <div class="p-8 mb-4">
        <a href="{% url 'home' %}" class="flex items-center space-x-3 group">
            <div class="w-10 h-10 bg-[#F2789F] rounded-2xl flex items-center justify-center text-white shadow-lg shadow-pink-100 group-hover:scale-110 transition-transform">
                <i class="fas fa-eye text-lg"></i>
            </div>
            <span class="text-2xl font-black text-[#F2789F] tracking-tighter">FlowerHub</span>
        </a>
    </div>

    <nav class="flex-1 px-4 space-y-3">
        <a href="{% url 'admin_users' %}"
           class="flex items-center p-4 rounded-2xl transition-all duration-200 font-bold text-sm
           {% if request.resolver_match.url_name == 'admin_users' %}
                bg-[#FFF0F5] text-[#F2789F] shadow-sm
           {% else %}
                text-gray-400 hover:bg-gray-50 hover:text-[#F2789F]
           {% endif %}">
            <i class="fas fa-users-cog mr-4 text-lg"></i>
            <span>Quản lý người dùng</span>
        </a>

        <a href="{% url 'admin_dashboard' %}"
           class="flex items-center p-4 rounded-2xl transition-all duration-200 font-bold text-sm
           {% if request.resolver_match.url_name == 'admin_dashboard' %}
                bg-[#FFF0F5] text-[#F2789F] shadow-sm
           {% else %}
                text-gray-400 hover:bg-gray-50 hover:text-[#F2789F]
           {% endif %}">
            <i class="fas fa-chart-pie mr-4 text-lg"></i>
            <span>Thống kê hoạt động</span>
        </a>
    </nav>

    <div class="p-6 border-t border-gray-50 space-y-4">
        <button class="flex items-center w-full p-3 text-gray-400 text-[11px] font-black uppercase tracking-widest bg-gray-50 rounded-xl hover:bg-gray-100 transition">
            <i class="fas fa-moon mr-3"></i> Chế độ tối
        </button>

        <a href="{% url 'logout_admin' %}" class="flex items-center ...">
            <i class="fas fa-sign-out-alt mr-3"></i> Đăng xuất hệ thống
        </a>
    </div>
</aside>
