<div id="userDetailModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-[2px] z-[200] hidden opacity-0 transition-all duration-300 flex items-center justify-center">

    <div class="absolute inset-0" onclick="closeModal()"></div>

    <div class="bg-white w-full max-w-2xl rounded-[40px] shadow-2xl transform scale-95 transition-all duration-300 relative overflow-hidden" id="modalContainer">

        <button onclick="closeModal()" class="absolute top-8 right-8 text-gray-300 hover:text-gray-500">
            <i class="fas fa-times text-xl"></i>
        </button>

        <div class="p-12">
            <h3 class="text-xl font-bold text-gray-800 mb-10">Chi tiết người dùng</h3>

            <div class="flex flex-col items-center">
                <div id="modalAvatar" class="w-24 h-24 bg-pink-50 rounded-full mb-8 flex items-center justify-center text-2xl font-black text-[#F2789F] border-4 border-white shadow-sm">
                    NH
                </div>

                <div class="grid grid-cols-2 gap-x-16 gap-y-8 w-full max-w-lg mb-12 text-left">
                    <div>
                        <p class="text-[10px] text-gray-300 font-black uppercase tracking-widest mb-1">Họ và tên</p>
                        <p id="modalName" class="font-bold text-gray-800">Nguyễn Văn Hùng</p>
                    </div>
                    <div>
                        <p class="text-[10px] text-gray-300 font-black uppercase tracking-widest mb-1">Ngày tham gia</p>
                        <p class="font-bold text-gray-800">12/05/2023</p>
                    </div>
                    <div>
                        <p class="text-[10px] text-gray-300 font-black uppercase tracking-widest mb-1">Số điện thoại</p>
                        <p class="font-bold text-gray-800">0987 654 321</p>
                    </div>
                    <div>
                        <p class="text-[10px] text-gray-300 font-black uppercase tracking-widest mb-1">Tổng đơn hàng</p>
                        <p class="font-bold text-[#F2789F]">15 đơn hàng</p>
                    </div>
                </div>

                <div class="flex space-x-4 w-full max-w-sm">
                    <button onclick="closeModal()" class="flex-1 py-3.5 bg-[#0055AA] text-white rounded-2xl font-bold text-sm shadow-lg shadow-blue-100 hover:opacity-90 transition-all">
                        Đóng
                    </button>
                    <button class="flex-1 py-3.5 bg-[#F2789F] text-white rounded-2xl font-bold text-sm shadow-lg shadow-pink-100 hover:opacity-90 transition-all">
                        Khóa
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function openModal(name, role) {
        const modal = document.getElementById('userDetailModal');
        const container = document.getElementById('modalContainer');

        document.getElementById('modalName').innerText = name;
        document.getElementById('modalAvatar').innerText = name.substring(0, 2).toUpperCase();

        modal.classList.remove('hidden');
        setTimeout(() => {
            modal.classList.remove('opacity-0');
            container.classList.remove('scale-95');
            container.classList.add('scale-100');
        }, 10);
    }

    function closeModal() {
        const modal = document.getElementById('userDetailModal');
        const container = document.getElementById('modalContainer');

        modal.classList.add('opacity-0');
        container.classList.add('scale-95');
        container.classList.remove('scale-100');

        setTimeout(() => {
            modal.classList.add('hidden');
        }, 300);
    }
</script>
