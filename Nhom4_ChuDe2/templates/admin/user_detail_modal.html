<div id="userDetailModal" class="fixed inset-0 bg-black/30 backdrop-blur-[2px] z-[100] flex items-center justify-center hidden opacity-0 transition-all duration-300">
    <div class="bg-white w-full max-w-2xl rounded-[32px] p-0 shadow-2xl transform scale-95 transition-all duration-300 relative overflow-hidden">

        <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-300 hover:text-gray-500 z-10">
            <i class="fas fa-times text-xl"></i>
        </button>

        <div class="p-12">
            <h3 class="text-xl font-bold text-gray-800 mb-10">Chi tiết người dùng</h3>

            <div class="flex flex-col items-center">
                <div id="modalAvatar" class="w-24 h-24 bg-pink-50 rounded-full mb-8 flex items-center justify-center text-2xl font-black text-pink-400 border-4 border-white shadow-sm">
                    NH
                </div>

                <div class="grid grid-cols-2 gap-x-16 gap-y-8 w-full max-w-lg mb-12">
                    <div class="text-left">
                        <p class="text-[10px] text-gray-300 font-black uppercase tracking-widest mb-1">Họ và tên</p>
                        <p id="modalName" class="font-bold text-gray-800">Nguyễn Văn Hùng</p>
                    </div>
                    <div class="text-left">
                        <p class="text-[10px] text-gray-300 font-black uppercase tracking-widest mb-1">Ngày tham gia</p>
                        <p class="font-bold text-gray-800">12/05/2023</p>
                    </div>
                    <div class="text-left">
                        <p class="text-[10px] text-gray-300 font-black uppercase tracking-widest mb-1">Số điện thoại</p>
                        <p class="font-bold text-gray-800">0987 654 321</p>
                    </div>
                    <div class="text-left">
                        <p class="text-[10px] text-gray-300 font-black uppercase tracking-widest mb-1">Tổng đơn hàng</p>
                        <p class="font-bold text-pink-400">15 đơn hàng</p>
                    </div>
                </div>

                <div class="flex space-x-3 w-full max-w-xs">
                    <button onclick="closeModal()" class="flex-1 py-3 bg-[#0055AA] text-white rounded-xl font-bold text-sm shadow-lg shadow-blue-100">Đóng</button>
                    <button class="flex-1 py-3 bg-pink-400 text-white rounded-xl font-bold text-sm shadow-lg shadow-pink-100">Khóa</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function openModal(name, role) {
        const modal = document.getElementById('userDetailModal');
        document.getElementById('modalName').innerText = name;
        document.getElementById('modalAvatar').innerText = name.substring(0, 2).toUpperCase();

        modal.classList.remove('hidden');
        setTimeout(() => {
            modal.classList.remove('opacity-0');
            modal.querySelector('div').classList.remove('scale-95');
        }, 10);
    }

    function closeModal() {
        const modal = document.getElementById('userDetailModal');
        modal.classList.add('opacity-0');
        modal.querySelector('div').classList.add('scale-95');
        setTimeout(() => { modal.classList.add('hidden'); }, 300);
    }
</script>
