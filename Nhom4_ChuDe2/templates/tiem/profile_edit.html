{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cập nhật hồ sơ năng lực</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');
        body { font-family: 'Quicksand', sans-serif; }
    </style>
</head>
<body class="bg-[#E8EDF4] text-gray-700">
    <div class="min-h-screen flex">
        <aside class="w-64 bg-white border-r border-gray-100 flex flex-col">
            <div class="px-6 py-6">
                <a href="#" class="flex items-center gap-2 text-[#F2789F] font-bold text-lg">
                    <span class="inline-flex h-6 w-6 items-center justify-center rounded-full bg-[#FBE9F1]">
                        <i class="fa-solid fa-spa text-xs"></i>
                    </span>
                    FlowerHub
                </a>
            </div>
            <nav class="px-4 flex-1 space-y-2 text-sm">
                <a href="{% url 'vendor_dashboard' %}" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-500 hover:bg-[#FBE9F1]">
                    <i class="fa-solid fa-house text-xs"></i> Trang chủ
                </a>
                <a href="{% url 'vendor_profile' %}" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-[#F2789F] text-white shadow">
                    <i class="fa-solid fa-folder-open text-xs"></i> Quản lý hồ sơ
                </a>
                <a href="{% url 'vendor_chat' %}" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-500 hover:bg-[#FBE9F1]">
                    <i class="fa-solid fa-comment-dots text-xs"></i> Chat
                </a>
                <a href="{% url 'vendor_quotes' %}" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-500 hover:bg-[#FBE9F1]">
                    <i class="fa-solid fa-file-invoice text-xs"></i> Đề xuất và báo giá
                </a>
                <a href="{% url 'vendor_orders' %}" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-500 hover:bg-[#FBE9F1]">
                    <i class="fa-solid fa-pen-to-square text-xs"></i> Cập nhật tiến độ
                </a>
                <a href="{% url 'vendor_stats' %}" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-500 hover:bg-[#FBE9F1]">
                    <i class="fa-solid fa-chart-line text-xs"></i> Thống kê
                </a>
            </nav>
        </aside>

        <main class="flex-1">
            <header class="h-16 bg-white border-b border-gray-100 px-8 flex items-center justify-between">
                <div class="text-sm text-gray-400"></div>
                <div class="flex items-center gap-4 text-sm">
                    <button class="relative text-gray-500">
                        <i class="fa-regular fa-bell"></i>
                    </button>
                    <div class="flex items-center gap-2">
                        <img id="header-logo" src="{% static 'images/db_logo.jpg' %}" alt="db_logo" class="w-8 h-8 rounded-full object-contain bg-white">
                        <span class="font-semibold text-gray-700">Lavender Studio</span>
                    </div>
                    <a href="{% url 'logout' %}" class="text-gray-400 hover:text-[#F2789F]">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </a>
                </div>
            </header>

            <section class="px-8 py-6 space-y-5">
                <h1 class="text-lg font-semibold text-gray-800">Cập nhật hồ sơ năng lực</h1>

                <div class="bg-white rounded-2xl p-5 shadow-sm">
                    <div class="flex items-center gap-2 mb-4">
                        <span class="inline-flex h-5 w-5 items-center justify-center rounded-full bg-[#FBE9F1] text-[#F2789F]">
                            <i class="fa-solid fa-id-card text-[10px]"></i>
                        </span>
                        <h2 class="text-sm font-semibold text-gray-800">Thông tin cơ bản</h2>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-xs text-gray-500 mb-2">Logo thương hiệu</label>
                            <label for="logo-upload" class="border border-gray-200 rounded-2xl p-4 flex flex-col items-center justify-center text-center text-xs text-gray-400 h-44 bg-[#F9FAFB] cursor-pointer relative overflow-hidden">
                                <img id="logo-preview" alt="Logo preview" class="hidden absolute inset-0 w-full h-full object-cover">
                                <div id="logo-placeholder" class="flex flex-col items-center">
                                    <div class="w-10 h-10 rounded-xl bg-white flex items-center justify-center text-gray-400 mb-2 border">
                                        <i class="fa-solid fa-camera"></i>
                                    </div>
                                    <div>Tải ảnh lên (Tối đa 2MB)</div>
                                    <div class="mt-2 text-[10px] text-gray-300">Định dạng hỗ trợ: JPG, PNG, WEBP</div>
                                </div>
                            </label>
                            <input id="logo-upload" type="file" accept="image/png,image/jpeg,image/webp" class="hidden">
                        </div>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-xs text-gray-500 mb-2">Tên tiệm hoa</label>
                                <input id="shop-name" type="text" value="Lavender Studio" class="w-full rounded-xl border border-gray-200 px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-pink-100">
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500 mb-2">Mô tả phong cách & Năng lực</label>
                                <textarea id="shop-desc" rows="5" class="w-full rounded-xl border border-gray-200 px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-pink-100" placeholder="Chia sẻ về phong cách thiết kế, kinh nghiệm và loại hoa thế mạnh của bạn..."></textarea>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-2xl p-5 shadow-sm">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-2">
                            <span class="inline-flex h-5 w-5 items-center justify-center rounded-full bg-[#FBE9F1] text-[#F2789F]">
                                <i class="fa-solid fa-images text-[10px]"></i>
                            </span>
                            <h2 class="text-sm font-semibold text-gray-800">Album sản phẩm mẫu</h2>
                        </div>
                        <button class="text-xs text-[#F2789F]">+ Thêm ảnh mới</button>
                    </div>
                    <div id="album-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <img src="{% static 'images/db_anh1.png' %}" alt="Mẫu 1" class="album-image w-full aspect-square rounded-xl object-cover cursor-pointer">
                        <img src="{% static 'images/db_anh2.png' %}" alt="Mẫu 2" class="album-image w-full aspect-square rounded-xl object-cover cursor-pointer">
                        <img src="{% static 'images/tiemhoa2.jpg' %}" alt="Mẫu 3" class="album-image w-full aspect-square rounded-xl object-cover cursor-pointer">
                        <label for="album-upload" class="w-full aspect-square rounded-xl border border-dashed border-gray-300 bg-[#F9FAFB] flex flex-col items-center justify-center text-xs text-gray-400 cursor-pointer">
                            <div class="w-8 h-8 rounded-full border flex items-center justify-center mb-2">
                                <i class="fa-solid fa-plus"></i>
                            </div>
                            Thêm ảnh
                        </label>
                    </div>
                    <input id="album-upload" type="file" accept="image/png,image/jpeg,image/webp" multiple class="hidden">
                    <input id="album-replace" type="file" accept="image/png,image/jpeg,image/webp" class="hidden">
                </div>

                <div class="flex items-center justify-end gap-3">
                    <button type="button" onclick="location.href='{% url 'vendor_profile' %}'" class="text-xs px-5 py-2 rounded-xl border border-gray-300 text-gray-500">Hủy bỏ</button>
                    <button id="save-profile" type="button" class="text-xs px-5 py-2 rounded-xl bg-[#F2789F] text-white font-semibold">Lưu thay đổi</button>
                </div>
            </section>
        </main>
    </div>
    <script>
        const STORAGE_KEY = 'vendor_profile';
        const logoInput = document.getElementById('logo-upload');
        const logoPreview = document.getElementById('logo-preview');
        const logoPlaceholder = document.getElementById('logo-placeholder');
        const shopNameInput = document.getElementById('shop-name');
        const shopDescInput = document.getElementById('shop-desc');
        const saveButton = document.getElementById('save-profile');

        logoInput.addEventListener('change', (e) => {
            const file = e.target.files && e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => {
                logoPreview.src = reader.result;
                logoPreview.classList.remove('hidden');
                logoPlaceholder.classList.add('hidden');
            };
            reader.readAsDataURL(file);
        });

        const albumInput = document.getElementById('album-upload');
        const albumReplaceInput = document.getElementById('album-replace');
        const albumGrid = document.getElementById('album-grid');
        let replaceTarget = null;

        albumInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files || []);
            files.forEach((file) => {
                const reader = new FileReader();
                reader.onload = () => {
                    const img = document.createElement('img');
                    img.src = reader.result;
                    img.alt = 'Ảnh mới';
                    img.className = 'album-image w-full aspect-square rounded-xl object-cover cursor-pointer';
                    albumGrid.insertBefore(img, albumGrid.lastElementChild);
                };
                reader.readAsDataURL(file);
            });
            albumInput.value = '';
        });

        albumGrid.addEventListener('click', (e) => {
            const target = e.target;
            if (target && target.classList.contains('album-image')) {
                replaceTarget = target;
                albumReplaceInput.click();
            }
        });

        albumReplaceInput.addEventListener('change', (e) => {
            const file = e.target.files && e.target.files[0];
            if (!file || !replaceTarget) return;
            const reader = new FileReader();
            reader.onload = () => {
                replaceTarget.src = reader.result;
                replaceTarget = null;
            };
            reader.readAsDataURL(file);
            albumReplaceInput.value = '';
        });

        const loadProfileData = () => {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
            let data;
            try {
                data = JSON.parse(raw);
            } catch (err) {
                return;
            }
            if (data.name) shopNameInput.value = data.name;
            if (data.description) shopDescInput.value = data.description;
            if (data.logo) {
                logoPreview.src = data.logo;
                logoPreview.classList.remove('hidden');
                logoPlaceholder.classList.add('hidden');
            }
            if (Array.isArray(data.album) && data.album.length) {
                const addTile = albumGrid.lastElementChild;
                albumGrid.querySelectorAll('.album-image').forEach((img) => img.remove());
                data.album.forEach((src) => {
                    const img = document.createElement('img');
                    img.src = src;
                    img.alt = 'Ảnh mới';
                    img.className = 'album-image w-full aspect-square rounded-xl object-cover cursor-pointer';
                    albumGrid.insertBefore(img, addTile);
                });
            }
        };

        saveButton.addEventListener('click', () => {
            const data = {
                name: shopNameInput.value.trim(),
                description: shopDescInput.value.trim(),
                logo: logoPreview.classList.contains('hidden') ? '' : logoPreview.src,
                album: Array.from(albumGrid.querySelectorAll('.album-image')).map((img) => img.src)
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            location.href = "{% url 'vendor_profile' %}";
        });

        loadProfileData();

        if (raw) {
            try {
                const data = JSON.parse(raw);
                if (data.logo) {
                    const headerLogo = document.getElementById('header-logo');
                    if (headerLogo) headerLogo.src = data.logo;
                }
            } catch (err) {}
        }
    </script>
</body>
</html>
