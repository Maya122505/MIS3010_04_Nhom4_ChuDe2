{% extends 'base.html' %}
{% block content %}
<div class="flex h-screen">
    {% include 'tiem/sidebar.html' %}
    <main class="flex-1 p-8 bg-gray-50 overflow-y-auto">
        <h2 class="text-2xl font-bold mb-6">Quản lý đơn hàng</h2>
        <div class="bg-white rounded-3xl border shadow-sm">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b">
                    <tr><th class="p-4">Mã đơn</th><th class="p-4">Khách</th><th class="p-4">Trạng thái</th></tr>
                </thead>
                <tbody>
                    {% for o in orders %}
                    <tr class="border-b">
                        <td class="p-4 font-bold">#{{ o.id }}</td>
                        <td class="p-4">{{ o.khach }}</td>
                        <td class="p-4"><span class="px-3 py-1 bg-pink-100 text-pink-600 rounded-full text-xs">{{ o.status }}</span></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </main>
</div>
{% endblock %}
