{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="min-h-screen bg-slate-50 py-12 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="mb-10 flex justify-between items-end">
            <div>
                <p class="text-pink-500 font-bold text-sm mb-1">Dành cho đối tác</p>
                <h1 class="text-4xl font-black text-gray-900">Đăng ký gian hàng</h1>
            </div>
            <a href="{% url 'login' %}" class="text-gray-400 text-sm hover:underline">Tôi đã có gian hàng</a>
        </div>

        <form class="space-y-8">
            <div class="bg-white p-8 rounded-[32px] shadow-sm border border-gray-100">
                <h3 class="text-xl font-bold mb-6 flex items-center"><span class="w-8 h-8 bg-pink-500 text-white rounded-full flex items-center justify-center mr-3 text-sm">1</span> Thông tin cơ bản</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <input type="text" placeholder="Tên tiệm hoa *" class="p-4 bg-gray-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-pink-200 transition-all">
                    <input type="text" placeholder="Số điện thoại *" class="p-4 bg-gray-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-pink-200 transition-all">
                    <input type="text" placeholder="Địa chỉ kinh doanh *" class="p-4 bg-gray-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-pink-200 transition-all md:col-span-2">
                </div>
            </div>

            <div class="bg-white p-8 rounded-[32px] shadow-sm border border-gray-100 text-center">
                <h3 class="text-xl font-bold mb-6 flex items-center text-left"><span class="w-8 h-8 bg-pink-500 text-white rounded-full flex items-center justify-center mr-3 text-sm">2</span> Hồ sơ năng lực</h3>
                <div class="border-2 border-dashed border-gray-100 rounded-[32px] p-12 hover:border-pink-300 transition-all cursor-pointer group">
                    <i class="fas fa-images text-4xl text-gray-200 group-hover:text-pink-200 transition-all mb-4"></i>
                    <p class="text-gray-400 text-sm italic">Tải lên ít nhất 3 ảnh sản phẩm mẫu đẹp nhất của tiệm</p>
                </div>
            </div>

            <button type="button" onclick="location.href='{% url 'login' %}'" class="w-full bg-pink-500 text-white font-bold py-5 rounded-[24px] shadow-xl hover:shadow-pink-200 transition-all text-lg" style="background-color: #F2789F;">
                Gửi hồ sơ đăng ký ngay
            </button>
        </form>
    </div>
</div>
{% endblock %}
